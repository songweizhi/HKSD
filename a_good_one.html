<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Species Map with Metadata</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
    .popup-content img {
      max-width: 150px;
      margin-top: 5px;
      display: block;
    }
    .popup-content {
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Initialize the map centered on Hong Kong
    var map = L.map("map").setView([22.3193, 114.1694], 11);

    // Add Carto Voyager tiles (modern colorful style)
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: "abcd",
        maxZoom: 20,
      }
    ).addTo(map);

    // Species data with metadata including photos (replace photo URLs accordingly)
    var speciesData = [
      {
        name: "Haliclona sp.",
        lat: 22.2819,
        lng: 114.1586,
        photo:
          "spo.jpg",
      },
      {
        name: "Xestospongia testudinaria",
        lat: 22.3700,
        lng: 114.2700,
        photo:
          "spo.jpg",
      },
    ];

    // Add markers with popup metadata
    speciesData.forEach(function (species) {
      var popupContent = `
        <div class="popup-content">
          <strong>Species Name:</strong> ${species.name}<br/>
          <strong>Latitude:</strong> ${species.lat.toFixed(4)}<br/>
          <strong>Longitude:</strong> ${species.lng.toFixed(4)}<br/>
          <img src="${species.photo}" alt="${species.name} photo"/>
        </div>
      `;
      L.marker([species.lat, species.lng]).addTo(map).bindPopup(popupContent);
    });
  </script>
</body>
</html>
